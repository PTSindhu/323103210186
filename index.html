<!DOCTYPE html>

<html>
<head>
  <title>Document Verification</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      text-align: center;
      padding: 50px;
      color: white;
    }

    .container {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 10px;
      width: 400px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
    }

    input[type="file"] {
      margin: 15px 0;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.9;
    }

    .store {
      background-color: #28a745;
      color: white;
    }

    .verify {
      background-color: #007bff;
      color: white;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>

</head>

<body>

<div class="container">
  <h2>📄 Document Verification System</h2>

  <input type="file" id="fileInput">

  <br>

<button class="store" onclick="storeFile()">Store File Hash</button> <button class="verify" onclick="verifyFile()">Verify File</button>

  <p id="result"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@4.0.3/dist/web3.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>

<script>
const web3 = new Web3("http://127.0.0.1:7545");

const contractAddress = "0xB536e97dF77A971ed7AB3FfE1C29ed1C615cb7F1";

const abi = [
  {
    "inputs": [{"internalType": "string","name": "_hash","type": "string"}],
    "name": "storeDocument",
    "outputs": [],
    "stateMutability": "nonpayable",
    "type": "function"
  },
  {
    "inputs": [],
    "name": "getDocument",
    "outputs": [{"internalType": "string","name": "","type": "string"}],
    "stateMutability": "view",
    "type": "function"
  }
];

const contract = new web3.eth.Contract(abi, contractAddress);

async function getFileHash() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Please select a file");
    return null;
  }

  const reader = new FileReader();

  return new Promise((resolve) => {
    reader.onload = function () {
      const wordArray = CryptoJS.lib.WordArray.create(reader.result);
      const hash = CryptoJS.SHA256(wordArray).toString();
      resolve(hash);
    };
    reader.readAsArrayBuffer(file);
  });
}

async function storeFile() {
  const accounts = await web3.eth.getAccounts();
  const hash = await getFileHash();

  if (!hash) return;

  await contract.methods.storeDocument(hash).send({
    from: accounts[0],
    gas: 3000000
  });

  document.getElementById("result").innerText = "✅ File hash stored successfully!";
}

async function verifyFile() {
  const fileHash = await getFileHash();
  if (!fileHash) return;

  const storedHash = await contract.methods.getDocument().call();

  if (fileHash === storedHash) {
    document.getElementById("result").innerText = "✅ Document is VERIFIED (Original)";
  } else {
    document.getElementById("result").innerText = "❌ Document is NOT VERIFIED (Tampered)";
  }
}
</script>

</body>
</html>
